<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การเชื่อมต่อสำเร็จ</title>
    <style>
        body {
            background-image: url('https://i0.wp.com/codemyui.com/wp-content/uploads/2016/11/pure-css-snow-animation.gif?fit=880%2C440&ssl=1'); /* เปลี่ยน URL นี้เป็น URL ของภาพพื้นหลังที่ต้องการ */
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <div>
        <h1>คุณได้เชื่อมต่ออินเทอร์เน็ตสำเร็จแล้ว</h1>
        <p>กรุณาปิดหน้านี้</p>
    </div>
</body>
</html>
